<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaraFun Queue Display</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="screensaver" class="screensaver hidden" aria-hidden="true">
    <div class="screensaver-background"></div>
    <div class="screensaver-content">
      <img src="assets/karafun-logo.svg" alt="KaraFun logo" class="screensaver-logo" id="screensaver-logo" onerror="this.src='assets/icon.png'">
      <h1 class="screensaver-title">Queue Is Quiet. Let's Fix That.</h1>
      <div id="screensaver-qr" class="screensaver-qr"></div>
      <p class="screensaver-hint">Scan and add your next anthem</p>
      <p id="screensaver-quote" class="screensaver-quote">Mic check... your next song could be legendary.</p>
    </div>
  </div>

  <div class="container">
    <!-- Top row: QR + current song -->
    <div class="header">
      <div class="header-content">
        <div id="current-song" class="current-song">
          <div class="current-label">Now Playing</div>
          <div class="current-album">
            <img id="current-cover" src="" alt="Album Cover" class="album-cover hidden">
          </div>
          <div class="current-info">
            <h2 id="current-title">Waiting for queue...</h2>
            <p id="current-artist" class="artist"></p>
            <p id="current-singer" class="singer"></p>
          </div>
          <div id="playback-indicator" class="playback-indicator" aria-label="Playback indicator" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="qr-section">
          <h2>Ready to Sing?</h2>
          <div id="qr-code"></div>
          <p class="qr-hint">Scan to join</p>
          <p class="session-line">Session: <span id="session-id">Not connected</span></p>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Queue Section -->
    <div class="queue-section">
      <h2 class="queue-title">Coming Up</h2>
      <div id="queue-list" class="queue-list">
        <div class="loading">Loading queue...</div>
      </div>
    </div>

    <!-- Status Footer -->
    <div class="footer">
      <span id="status" class="status">Connecting...</span>
      <span id="time" class="time"></span>
    </div>
  </div>

  <div id="session-modal" class="session-modal hidden" aria-hidden="true">
    <div class="session-modal-backdrop" data-close-modal="true"></div>
    <div class="session-modal-content" role="dialog" aria-modal="true" aria-labelledby="session-modal-title">
      <h2 id="session-modal-title">Connect to KaraFun Session</h2>
      <form id="session-form" class="session-form">
        <label for="session-input">Session ID or URL</label>
        <input id="session-input" type="text" maxlength="120" placeholder="272367 or https://www.karafun.com/272367/" required>

        <label for="nickname-input">Nickname</label>
        <input id="nickname-input" type="text" maxlength="16" placeholder="QueueAdmin" required>

        <div class="session-modal-actions">
          <button id="cancel-session" type="button" class="session-button-secondary">Cancel</button>
          <button type="submit" class="session-button-primary">Connect</button>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/screensaver-quotes.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
